services:
  postgres:
    image: postgres:16-alpine
    container_name: breeze-postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=Breeze-local
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - breeze-postgres-data:/var/lib/postgresql/data

  webApp:
    image: breeze-web
    build:
      context: ./Breeze.Web
      dockerfile: Dockerfile.web
    ports:
      - 5173:5173
    volumes:
      - ./Breeze.Web/src:/app/src/web
    environment:
      - CHOKIDAR_USEPOLLING=true
  webApi:
    image: breeze-api
    build:
      context: ./
      dockerfile: Dockerfile.api
    depends_on:
      - postgres
    ports:
      - 7284:8080
    volumes:
      - ./Breeze.Api:/app/src/api
      - ./Breeze.Data:/app/src/api
      - ./Breeze.Domain:/app/src/api
      - ./Breeze.Sql:/app/src/api
    environment:
      - CHOKIDAR_USEPOLLING=true
      - ConnectionStrings__breezeDb-local=Host=postgres;Port=5432;Database=Breeze-local;Username=postgres;Password=postgres

volumes:
  breeze-postgres-data:
